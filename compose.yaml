services:
  ###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${DATABASE_SERVER_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-app}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_USER: ${DATABASE_USER:-app}
    healthcheck:
      test:
        [
          "CMD",
          "pg_isready",
          "-d",
          "${DATABASE_NAME:-app}",
          "-U",
          "${DATABASE_USER:-app}",
        ]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

volumes:
  ###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###
